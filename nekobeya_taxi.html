
<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ペットタクシー料金計算</title>
    <style>
        :root {
            --primary-color: #FF8C00;
            --primary-dark: #E67E00;
            --bg-color: #FFF5E6;
            --text-color: #333;
            --card-bg: #ffffff;
            --shadow-color: rgba(0, 0, 0, 0.1);
            --danger-color: #ff4d4d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px 15px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 25px 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px var(--shadow-color);
        }

        h1 {
            text-align: center;
            color: var(--text-color);
            font-size: 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        h1 span { font-size: 32px; }

        /* タブ切り替え */
        .tabs {
            display: flex;
            margin-bottom: 20px;
            background: #f5f5f5;
            padding: 5px;
            border-radius: 12px;
        }
        .tab-btn {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            font-weight: bold;
            color: #888;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .tab-btn.active {
            background: #fff;
            color: var(--primary-color);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 20px; }
        label { font-weight: 700; display: block; margin-bottom: 8px; color: #444; font-size: 14px; }

        /* 入力フィールド共通 */
        select, input[type="text"], input[type="number"] {
            width: 100%;
            padding: 16px;
            border: 2px solid #eee;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 16px;
            transition: border-color 0.3s;
            -webkit-appearance: none;
            background-color: #fafafa;
            font-family: inherit;
        }
        select:focus, input:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
        }

        /* --- 日時入力のUI --- */
        .datetime-container {
            background: #fafafa;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 5px 15px;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }
        .datetime-container:focus-within {
            border-color: var(--primary-color);
            background: #fff;
        }
        
        input[type="datetime-local"] {
            width: 100%;
            padding: 10px 0;
            font-size: 18px;
            border: none;
            background: transparent;
            font-family: inherit;
            color: #333;
            outline: none;
        }
        
        /* 入力クリアボタン */
        .clear-btn {
            background: #eee;
            border: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            color: #666;
            cursor: pointer;
            margin-top: 8px;
            display: inline-block;
            transition: 0.2s;
        }
        .clear-btn:hover { background: #ddd; }


        /* 経由地エリア */
        .waypoint-item {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
            animation: fadeIn 0.3s ease;
        }
        .remove-btn {
            background: #ffecec;
            color: var(--danger-color);
            border: 1px solid #ffcccc;
            border-radius: 8px;
            width: 44px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            flex-shrink: 0;
        }
        .add-waypoint-btn {
            background: none;
            border: 2px dashed #ddd;
            color: #666;
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 20px;
            transition: 0.2s;
        }
        .add-waypoint-btn:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        /* チェックボックス */
        .checkbox-wrapper {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding: 15px;
            background-color: #fff8e1;
            border-radius: 12px;
            border: 2px solid #ffe0b2;
            cursor: pointer;
            transition: 0.2s;
        }
        .checkbox-wrapper:active { transform: scale(0.98); }
        .checkbox-wrapper input {
            margin-right: 15px;
            transform: scale(1.5);
            accent-color: var(--primary-color);
            cursor: pointer;
        }
        .checkbox-wrapper label {
            margin: 0;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            color: var(--primary-dark);
            flex: 1; 
        }
        .discount-badge {
            background: #ff4d4d;
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
            white-space: nowrap;
        }
        .add-badge {
            background: #1976d2;
            color: white;
            font-size: 12px;
            padding: 2px 6px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
            white-space: nowrap;
        }

        .checkbox-avoid {
            background-color: #f0f4c3;
            border-color: #dce775;
        }
        .checkbox-avoid label { color: #558b2f; }
        .checkbox-avoid input { accent-color: #7cb342; }

        /* 羽田空港チェック */
        .haneda-box {
            background-color: #e3f2fd;
            border: 2px solid #90caf9;
            border-radius: 12px;
            padding: 12px 15px;
            margin-bottom: 15px;
        }
        .haneda-check-item {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
        }
        .haneda-check-item input {
            accent-color: #1976d2;
            transform: scale(1.4);
            cursor: pointer;
        }
        .haneda-check-item label {
            margin: 0;
            font-size: 15px;
            font-weight: bold;
            color: #1565c0;
            cursor: pointer;
            flex: 1;
        }

        /* 手動追加料金エリア */
        .extra-charges-box {
            background: #f3e5f5;
            border: 2px solid #ce93d8;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .extra-charges-title {
            font-weight: bold;
            font-size: 14px;
            color: #6a1b9a;
            margin-bottom: 10px;
        }
        .extra-charges-box input[type="number"] {
            background: #fff;
        }

        button.calc-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(to right, var(--primary-color), var(--primary-dark));
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(230, 126, 0, 0.3);
            margin-top: 10px;
        }
        button.calc-btn:active { transform: scale(0.98); }

        /* 結果エリア */
        .result-box {
            background-color: #FFF0E0;
            padding: 20px;
            border-radius: 15px;
            margin-top: 30px;
            display: none;
            border-left: 5px solid var(--primary-color);
        }
        .result-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 15px;
        }
        .result-item {
            background: #fff;
            padding: 10px;
            border-radius: 10px;
            text-align: center;
        }
        .result-label { font-size: 12px; color: #777; display: block; margin-bottom: 5px; }
        .result-value { font-size: 18px; font-weight: bold; }

        .price-container {
            text-align: center;
            padding-top: 15px;
            border-top: 2px dashed #ddd;
        }
        .price {
            font-size: 36px;
            font-weight: 800;
            color: var(--primary-dark);
            line-height: 1.2;
        }
        .price span { font-size: 20px; }
        .note { font-size: 12px; color: #888; margin-top: 10px; text-align: center; }

        #map {
            height: 250px;
            width: 100%;
            margin-top: 30px;
            border-radius: 15px;
            display: none;
        }
        .hidden { display: none; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .pac-container {
            border-radius: 0 0 10px 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border-top: none;
            font-family: inherit;
        }
    </style>
    
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCH7MD4Jj8pKU9hDSJUYqBgq8fQsMWWDjE&libraries=places"></script>
</head>
<body>

<div class="container">
    <h1><span>🐈</span> ペットタクシー料金</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('map')">住所から検索</button>
        <button class="tab-btn" onclick="switchTab('manual')">距離入力</button>
    </div>

    <div id="mode-map">
        <div class="form-group">
            <label for="origin-select">店舗名</label>
            <div class="select-wrapper">
                <select id="origin-select" onchange="toggleOriginInput()">
                    <option value="minato">ねこべや港区本店</option>
                    <option value="haneda">ねこべや羽田空港店</option>
                    <option value="suginami">ねこべや杉並店</option>
                    <option value="musashino">ねこべや武蔵野店</option>
                    <option value="edogawa">ねこべや江戸川店</option>
                    <option value="other">その他（住所入力）</option>
                </select>
            </div>
            
            <div id="origin-custom-container" style="display: none; margin-top: 10px;">
                <input type="text" id="origin-custom" placeholder="出発地を入力してください">
            </div>
        </div>

        <div id="waypoints-container"></div>
        <button type="button" class="add-waypoint-btn" onclick="addWaypoint()">＋ 経由地を追加する</button>

        <div class="form-group">
            <label for="destination">お客様住所</label>
            <input type="text" id="destination" placeholder="住所または施設名を入力">
        </div>

        <div class="form-group">
            <label for="dept-time">出発日時 (任意)</label>
            <div class="datetime-container">
                <input type="datetime-local" id="dept-time" step="600">
            </div>
            
            <button type="button" class="clear-btn" onclick="clearDate()">入力クリア (現在時刻に戻す)</button>
            <p style="font-size:12px; color:#666; margin-top:5px;">※日時を指定すると、その時間の渋滞予測を考慮します。</p>
        </div>
    </div>

    <div id="mode-manual" class="hidden">
        <div class="form-group">
            <label for="manual-base-fare">初乗り料金</label>
            <select id="manual-base-fare">
                <option value="1650">1,650円（羽田・港区）</option>
                <option value="3300">3,300円（杉並・武蔵野・江戸川）</option>
                <option value="5500">5,500円（その他）</option>
            </select>
        </div>
        <div class="form-group">
            <label for="manual-dist">行きの距離 (km)</label>
            <input type="number" id="manual-dist" placeholder="例：15.5" step="0.1">
        </div>
        <div class="form-group" id="manual-return-group" style="display:none;">
            <label for="manual-dist-return">帰りの距離 (km)</label>
            <input type="number" id="manual-dist-return" placeholder="例：12.0" step="0.1">
        </div>
        <p style="font-size:12px; color:#888; margin-bottom:15px;">※Googleマップを使わず、距離だけで計算します。</p>
    </div>

    <!-- ✅ デフォルトチェック済みに変更 -->
    <div class="checkbox-wrapper checkbox-avoid" onclick="toggleCheckbox('avoid-tolls')">
        <input type="checkbox" id="avoid-tolls" checked>
        <label for="avoid-tolls">
            有料道路を使わない（距離優先）
        </label>
    </div>

    <!-- 羽田空港経由 -->
    <div class="haneda-box">
        <div class="haneda-check-item" onclick="this.querySelector('input').click(); toggleHanedaSelect()">
            <input type="checkbox" id="via-haneda" onclick="event.stopPropagation(); toggleHanedaSelect()">
            <label for="via-haneda">✈️ 羽田空港を経由する</label>
            <span class="add-badge">+2,200円</span>
        </div>
        <div id="haneda-select-box" style="display:none; margin-top:10px;">
            <select id="haneda-trips" style="font-size:14px; padding:10px 12px;">
                <option value="one">片道のみ（+2,200円）</option>
                <option value="both">往復（+4,400円）</option>
            </select>
        </div>
    </div>

    <div class="checkbox-wrapper" onclick="toggleCheckbox('round-trip')">
        <input type="checkbox" id="round-trip" onchange="toggleReturnInputs()">
        <label for="round-trip">
            往復で利用する
            <span class="discount-badge">10% OFF</span>
        </label>
    </div>

    <!-- 住所検索モード：帰りルート自動計算の案内 -->
    <div id="return-dist-box" style="display:none; background:#fff3e0; border:2px solid #ffcc80; border-radius:12px; padding:12px 15px; margin-bottom:15px; font-size:13px; color:#e65100;">
        📍 帰りのルートはお客様宅→同じ店舗で自動計算します。
    </div>

    <!-- 追加料金 -->
    <div class="extra-charges-box">
        <div class="extra-charges-title">➕ 追加料金（任意）</div>
        <input type="number" id="extra-charge-amount" placeholder="金額を入力（例：1000）" min="0" step="100">
    </div>

    <button class="calc-btn" onclick="startCalculation()">料金を計算する</button>

    <div id="result" class="result-box">
        <div class="result-grid">
            <div class="result-item">
                <span class="result-label">総走行距離</span>
                <span id="dist-text" class="result-value">--</span>
            </div>
            <div class="result-item">
                <span class="result-label">所要時間 <span id="time-note" style="font-weight:normal; font-size:10px;"></span></span>
                <span id="dur-text" class="result-value">--</span>
            </div>
        </div>
        <div class="price-container">
            <span class="price-label">概算料金（税込）</span>
            <span id="price-text" class="price">--<span>円</span></span>
            <div id="round-trip-tag" style="display:none; color:#d32f2f; font-weight:bold; font-size:14px; margin-top:5px;">
                🎉 往復割引(10%OFF) 適用済み
            </div>
            <div id="round-trip-base-tag" style="display:none; color:#888; font-size:12px; margin-top:4px;"></div>
            <div id="haneda-tag" style="display:none; color:#1565c0; font-weight:bold; font-size:13px; margin-top:5px;"></div>
            <div id="extra-tag" style="display:none; color:#6a1b9a; font-size:13px; margin-top:4px;"></div>
        </div>
        <p class="note" id="note-base-fare">※片道：初乗り3kmまで--円、以降1kmごとに550円（端数切上）</p>
        <p class="note">※羽田空港経由：+2,200円/回</p>
    </div>

    <div id="map"></div>
</div>

<script>
    let map;
    let directionsService;
    let directionsRenderer;
    let currentMode = 'map';

    // 登録地の住所定義
    const STORE_ADDRESSES = {
        'minato': '東京都港区芝3丁目13-5',
        'haneda': '東京都大田区羽田1-8-4',
        'suginami': '東京都杉並区宮前4丁目25-28',
        'musashino': '東京都武蔵野市関前4-11-25',
        'edogawa': '東京都江戸川区新堀1丁目24-1'
    };

    const HANEDA_SURCHARGE = 2200; // 羽田空港経由追加料金（片道）

    function initMap() {
        const tokyo = { lat: 35.6895, lng: 139.6917 };
        map = new google.maps.Map(document.getElementById("map"), {
            zoom: 10,
            center: tokyo,
            mapTypeControl: false,
            streetViewControl: false
        });
        directionsService = new google.maps.DirectionsService();
        directionsRenderer = new google.maps.DirectionsRenderer();
        directionsRenderer.setMap(map);

        setupAutocomplete(document.getElementById("destination"));
        setupAutocomplete(document.getElementById("origin-custom"));
    }

    function setupAutocomplete(inputElement) {
        const options = {
            componentRestrictions: { country: "jp" },
            fields: ["formatted_address", "geometry", "name"],
        };
        new google.maps.places.Autocomplete(inputElement, options);
    }

    window.onload = initMap;

    function toggleOriginInput() {
        const select = document.getElementById("origin-select");
        const customContainer = document.getElementById("origin-custom-container");
        if (select.value === "other") {
            customContainer.style.display = "block";
            document.getElementById("origin-custom").focus();
        } else {
            customContainer.style.display = "none";
        }
    }

    function toggleReturnOriginInput() {}  // 不使用（互換用）

    function toggleReturnInputs() {
        const isRoundTrip = document.getElementById('round-trip').checked;
        const retDistBox = document.getElementById('return-dist-box');
        if (retDistBox) retDistBox.style.display = (isRoundTrip && currentMode === 'map') ? 'block' : 'none';
        const retManualGroup = document.getElementById('manual-return-group');
        if (retManualGroup) retManualGroup.style.display = (isRoundTrip && currentMode === 'manual') ? 'block' : 'none';
    }

    function toggleHanedaSelect() {
        updateHanedaSelectVisibility();
    }

    function updateHanedaSelectVisibility() {
        const checked = document.getElementById('via-haneda').checked;
        document.getElementById('haneda-select-box').style.display = checked ? 'block' : 'none';
    }

    function switchTab(mode) {
        currentMode = mode;
        document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        if (mode === 'map') {
            document.getElementById('mode-map').classList.remove('hidden');
            document.getElementById('mode-manual').classList.add('hidden');
            document.getElementById('map').style.display = 'block';
        } else {
            document.getElementById('mode-map').classList.add('hidden');
            document.getElementById('mode-manual').classList.remove('hidden');
            document.getElementById('map').style.display = 'none';
        }
        document.getElementById("result").style.display = "none";
        toggleReturnInputs();
    }

    function addWaypoint() {
        const container = document.getElementById('waypoints-container');
        const div = document.createElement('div');
        div.className = 'waypoint-item';
        
        const input = document.createElement('input');
        input.type = 'text';
        input.className = 'waypoint-input';
        input.placeholder = '経由地を入力';
        
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'remove-btn';
        btn.innerText = '×';
        btn.onclick = function() { div.remove(); };

        div.appendChild(input);
        div.appendChild(btn);
        container.appendChild(div);

        setupAutocomplete(input);
    }

    function toggleCheckbox(id) {
        if (event.target.tagName !== 'INPUT' && event.target.tagName !== 'LABEL') {
            const chk = document.getElementById(id);
            chk.checked = !chk.checked;
            if (id === 'round-trip') toggleReturnInputs();
        }
    }

    function clearDate() {
        document.getElementById('dept-time').value = '';
    }

    function startCalculation() {
        if (currentMode === 'map') {
            calculateByMap();
        } else {
            calculateByManual();
        }
    }

    // 店舗ごとの初乗り料金
    const STORE_BASE_FARE = {
        'minato':    1650,
        'haneda':    1650,
        'suginami':  3300,
        'musashino': 3300,
        'edogawa':   3300,
        'other':     5500
    };

    // 片道の距離から料金を計算するヘルパー（baseFare を外から渡す）
    function calcOnewayFare(distanceKm, baseFare) {
        const addFare = 550;
        if (distanceKm <= 3) return baseFare;
        return baseFare + Math.ceil(distanceKm - 3) * addFare;
    }

    function getHanedaSurcharge() {
        if (!document.getElementById('via-haneda').checked) return 0;
        const trips = document.getElementById('haneda-trips').value;
        return trips === 'both' ? HANEDA_SURCHARGE * 2 : HANEDA_SURCHARGE;
    }

    function calculateByMap() {
        const selectVal = document.getElementById("origin-select").value;
        let origin = selectVal === "other"
            ? document.getElementById("origin-custom").value
            : STORE_ADDRESSES[selectVal];

        if (!origin) { alert("出発地の住所を入力してください。"); return; }

        const destination = document.getElementById("destination").value;
        if (!destination) { alert("お届け先住所を入力してください。"); return; }

        const avoidTolls = document.getElementById("avoid-tolls").checked;
        const timeInput = document.getElementById("dept-time").value;
        const isRoundTrip = document.getElementById('round-trip').checked;
        const baseFare = STORE_BASE_FARE[selectVal] || 5500;

        const waypointInputs = document.querySelectorAll('.waypoint-input');
        const waypoints = [];
        waypointInputs.forEach(input => {
            if (input.value.trim() !== "") waypoints.push({ location: input.value, stopover: true });
        });

        const request = {
            origin, destination, waypoints,
            optimizeWaypoints: true,
            avoidTolls,
            travelMode: 'DRIVING',
            unitSystem: google.maps.UnitSystem.METRIC
        };

        let isPredicted = false;
        if (timeInput) {
            const departureDate = new Date(timeInput);
            if (departureDate >= new Date()) {
                request.drivingOptions = { departureTime: departureDate, trafficModel: 'bestguess' };
                isPredicted = true;
            }
        }

        directionsService.route(request, function(result, status) {
            if (status !== 'OK') { alert("ルートが見つかりませんでした。\nエラー: " + status); return; }

            directionsRenderer.setDirections(result);
            document.getElementById('map').style.display = 'block';

            let totalDistMeters = 0, totalDurSeconds = 0;
            result.routes[0].legs.forEach(leg => {
                totalDistMeters += leg.distance.value;
                totalDurSeconds += (leg.duration_in_traffic || leg.duration).value;
            });

            const distKm = totalDistMeters / 1000;
            const distText = distKm.toFixed(1) + " km";
            const hours = Math.floor(totalDurSeconds / 3600);
            const minutes = Math.floor((totalDurSeconds % 3600) / 60);
            const durText = (hours > 0 ? hours + "時間 " : "") + minutes + "分";

            const timeNote = document.getElementById("time-note");
            timeNote.innerText = isPredicted ? "(渋滞予測)" : "";
            timeNote.style.color = "#d32f2f";

            if (isRoundTrip) {
                directionsService.route({
                    origin: destination, destination: origin,
                    avoidTolls, travelMode: 'DRIVING',
                    unitSystem: google.maps.UnitSystem.METRIC
                }, function(retResult, retStatus) {
                    let returnDistKm = distKm;
                    if (retStatus === 'OK') {
                        let retMeters = 0;
                        retResult.routes[0].legs.forEach(leg => retMeters += leg.distance.value);
                        returnDistKm = retMeters / 1000;
                    }
                    displayFinalPrice(distKm, returnDistKm, distText, durText, baseFare);
                });
            } else {
                displayFinalPrice(distKm, distKm, distText, durText, baseFare);
            }
        });
    }

    function calculateByManual() {
        const distInput = document.getElementById("manual-dist").value;
        if (!distInput || distInput <= 0) { alert("有効な距離(km)を入力してください。"); return; }
        const goDistKm = parseFloat(distInput);
        const isRoundTrip = document.getElementById('round-trip').checked;

        let returnDistKm = goDistKm;
        if (isRoundTrip) {
            const retInput = document.getElementById("manual-dist-return").value;
            if (retInput && retInput > 0) returnDistKm = parseFloat(retInput);
        }

        document.getElementById("time-note").innerText = "";
        const baseFare = parseInt(document.getElementById('manual-base-fare').value) || 5500;
        displayFinalPrice(goDistKm, returnDistKm, goDistKm + " km", "--", baseFare);
    }

    function displayFinalPrice(goDistKm, returnDistKm, distText, durText, baseFare) {
        const isRoundTrip = document.getElementById('round-trip').checked;
        const hanedaSurcharge = getHanedaSurcharge();
        const extraAmt = parseInt(document.getElementById('extra-charge-amount').value) || 0;

        const goFare = calcOnewayFare(goDistKm, baseFare);
        const returnFare = calcOnewayFare(returnDistKm, baseFare);

        let subtotal = 0;
        const baseTag = document.getElementById('round-trip-base-tag');

        if (isRoundTrip) {
            subtotal = Math.floor((goFare + returnFare) * 0.9);
            document.getElementById('round-trip-tag').style.display = 'block';
            if (goFare !== returnFare) {
                baseTag.innerText = `（行き ${goFare.toLocaleString()}円 ＋ 帰り ${returnFare.toLocaleString()}円）× 10%OFF`;
                baseTag.style.display = 'block';
            } else {
                baseTag.style.display = 'none';
            }
        } else {
            subtotal = goFare;
            document.getElementById('round-trip-tag').style.display = 'none';
            baseTag.style.display = 'none';
        }

        const totalPrice = subtotal + hanedaSurcharge + extraAmt;

        // 羽田タグ
        const hanedaTag = document.getElementById('haneda-tag');
        if (hanedaSurcharge > 0) {
            const label = document.getElementById('haneda-trips').value === 'both' ? '往復' : '片道';
            hanedaTag.innerText = `✈️ 羽田空港経由（${label}）+${hanedaSurcharge.toLocaleString()}円`;
            hanedaTag.style.display = 'block';
        } else {
            hanedaTag.style.display = 'none';
        }

        // 追加料金タグ
        const extraTag = document.getElementById('extra-tag');
        if (extraAmt > 0) {
            extraTag.innerText = `➕ 追加料金 +${extraAmt.toLocaleString()}円`;
            extraTag.style.display = 'block';
        } else {
            extraTag.style.display = 'none';
        }

        document.getElementById("dist-text").innerText = distText;
        document.getElementById("dur-text").innerText = durText;
        document.getElementById("price-text").innerHTML = totalPrice.toLocaleString() + "<span>円</span>";
        document.getElementById("note-base-fare").innerText = `※片道：初乗り3kmまで${baseFare.toLocaleString()}円、以降1kmごとに550円（端数切上）`;

        const resultBox = document.getElementById("result");
        resultBox.style.display = "block";
        resultBox.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
</script>
